<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Elder Assist</title>
<link href="https://fonts.googleapis.com/css2?family=Sansita+Swashed:wght@400;600&display=swap" rel="stylesheet">

<link rel="icon" href="/IMAGES/header logo.png" type="image/png">
<link rel="stylesheet" href="../CSS files/signinstyle.css">
</head>

<body>

<div class="login-box">
    <h1>LOGIN</h1>

    <form>
        
        <label>Email</label>
        <input type="email" placeholder="Enter your email" required>

        <label>Password</label>
        <input type="password" placeholder="Enter your password" required>

        <button type="submit">Login</button>
    </form>

    <!-- NEW SECTION -->
    <p class="signup-text">
        Don’t have an account? <a href="/HTML files/signup.html"><u>Sign Up</u></a>
    </p>

</div>

</body>
</html>
